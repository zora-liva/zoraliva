<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Best Amazon Finds Under $50 | Kaia Layn</title>
  <style>
    :root {
      --bg: #fffaf8;
      --card: #ffffff;
      --text: #2f2623;
      --muted: #8d7b74;
      --accent: #6a3d2e;
      --border: #f0e4de;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 48px 20px;
    }

    .back-link {
      display: inline-block;
      margin-bottom: 24px;
      color: var(--accent);
      text-decoration: none;
      font-weight: 700;
    }

    .page-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 28px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.04);
    }

    h1 {
      margin-top: 0;
      color: var(--accent);
    }

    .subtitle {
      color: var(--muted);
      margin-bottom: 20px;
    }

    .product-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    .product-list li {
      padding: 14px 0;
      border-bottom: 1px solid var(--border);
    }

    .product-list li:last-child {
      border-bottom: none;
    }

    .product-list a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 700;
    }

    .note {
      color: var(--muted);
      font-size: 0.92rem;
      margin-top: 24px;
    }
  </style>
</head>
<body>
  <div class="container">
    <a class="back-link" href="index.html">← Back to home</a>

    <div class="page-card">
      <h1>Best Amazon Finds Under $50</h1>
      <p class="subtitle">Budget-friendly finds that feel surprisingly premium.</p>

      <ul class="product-list">
        <li><a href="#">Product 1 name</a></li>
        <li><a href="#">Product 2 name</a></li>
        <li><a href="#">Product 3 name</a></li>
        <li><a href="#">Product 4 name</a></li>
      </ul>

      <p class="note">Affiliate links may earn me a commission at no extra cost to you.</p>
    </div>
  </div>
</body>
</html>
